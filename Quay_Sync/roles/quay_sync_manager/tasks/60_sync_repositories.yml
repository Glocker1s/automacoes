---
- name: Sync | Definir repositories candidatos
  ansible.builtin.set_fact:
    quay_sync_candidate_repositories_effective: "{{ quay_initial_summary.sync_candidate_repositories | default([]) }}"

- name: Sync | Exibir candidatos
  ansible.builtin.debug:
    msg:
      - "Repos candidatos a sync: {{ quay_sync_candidate_repositories_effective }}"
      - "Executar sync-cancel antes do sync-now: {{ quay_sync_cancel_before_now | bool }}"

- name: Sync | Inicializar ações quando não houver candidatos
  ansible.builtin.set_fact:
    quay_sync_actions: []
    quay_sync_performed: false
    quay_sync_failed_actions: 0
    quay_sync_wait_summary:
      timeout: []
      terminal_failed: []
      http_errors: []
      total_timeout: 0
      total_terminal_failed: 0
      total_http_errors: 0
      has_partial_failure: false
  when: quay_sync_candidate_repositories_effective | length == 0

- name: Sync | Executar sync nativo do Quay nos candidatos
  when: quay_sync_candidate_repositories_effective | length > 0
  block:
    - name: Sync | Executar sync-cancel nos repositories candidatos
      ansible.builtin.uri:
        url: "{{ quay_target_url }}/api/v1/repository/{{ item }}/mirror/sync-cancel"
        method: POST
        headers:
          Authorization: "Bearer {{ quay_target.token }}"
          Accept: "application/json"
        validate_certs: "{{ quay_target_validate_certs }}"
        return_content: true
        status_code:
          - 200
          - 201
          - 202
          - 204
          - 400
          - 401
          - 403
          - 404
          - 409
          - 429
          - 500
          - 502
          - 503
          - 504
        timeout: "{{ quay_api_timeout | default(30) }}"
      loop: "{{ quay_sync_candidate_repositories_effective }}"
      loop_control:
        label: "{{ item }}"
      register: _quay_sync_cancel_results
      when: quay_sync_cancel_before_now | bool
      failed_when: false
      no_log: "{{ quay_hide_sensitive_logs | bool }}"

    - name: Sync | Executar sync-now nos repositories candidatos
      ansible.builtin.uri:
        url: "{{ quay_target_url }}/api/v1/repository/{{ item }}/mirror/sync-now"
        method: POST
        headers:
          Authorization: "Bearer {{ quay_target.token }}"
          Accept: "application/json"
        validate_certs: "{{ quay_target_validate_certs }}"
        return_content: true
        status_code:
          - 200
          - 201
          - 202
          - 204
          - 400
          - 401
          - 403
          - 404
          - 409
          - 429
          - 500
          - 502
          - 503
          - 504
        timeout: "{{ quay_api_timeout | default(30) }}"
      loop: "{{ quay_sync_candidate_repositories_effective }}"
      loop_control:
        label: "{{ item }}"
      register: _quay_sync_now_results
      failed_when: false
      no_log: "{{ quay_hide_sensitive_logs | bool }}"

    - name: Sync | Montar ações executadas
      ansible.builtin.set_fact:
        quay_sync_actions_json: >-
          {%- set out = [] -%}
          {%- for r in (_quay_sync_cancel_results.results | default([])) -%}
            {%- set status = r.status | default(0) | int -%}
            {%- set body = r.json | default({}) -%}
            {%- set _ = out.append({
              'repository': r.item | default('N/A'),
              'action': 'sync-cancel',
              'http_status': status,
              'ok': status in [200, 201, 202, 204, 400, 404],
              'message': body.detail | default(body.error_message | default(r.msg | default('')))
            }) -%}
          {%- endfor -%}
          {%- for r in (_quay_sync_now_results.results | default([])) -%}
            {%- set status = r.status | default(0) | int -%}
            {%- set body = r.json | default({}) -%}
            {%- set _ = out.append({
              'repository': r.item | default('N/A'),
              'action': 'sync-now',
              'http_status': status,
              'ok': status in [200, 201, 202, 204],
              'message': body.detail | default(body.error_message | default(r.msg | default('')))
            }) -%}
          {%- endfor -%}
          {{ out | to_json }}

    - name: Sync | Publicar ações executadas
      ansible.builtin.set_fact:
        quay_sync_actions: "{{ quay_sync_actions_json | from_json }}"
        quay_sync_performed: true
        quay_sync_failed_actions: >-
          {{ (quay_sync_actions_json | from_json) | rejectattr('ok') | list | length }}

    - name: Sync | Gravar JSON de ações
      ansible.builtin.copy:
        dest: "{{ quay_sync_actions_file }}"
        mode: "0640"
        content: "{{ quay_sync_actions | to_nice_json }}"

    - name: Sync | Aguardar início/processamento do mirror
      ansible.builtin.pause:
        seconds: "{{ quay_sync_wait_after_trigger_seconds | int }}"
      when: (quay_sync_wait_after_trigger_seconds | int) > 0

    - name: Sync | Aguardar repositories retornarem para SUCCESS
      ansible.builtin.uri:
        url: "{{ quay_target_url }}/api/v1/repository/{{ item }}/mirror"
        method: GET
        headers:
          Authorization: "Bearer {{ quay_target.token }}"
          Accept: "application/json"
        validate_certs: "{{ quay_target_validate_certs }}"
        return_content: true
        status_code:
          - 200
          - 401
          - 403
          - 404
          - 429
          - 500
          - 502
          - 503
          - 504
        timeout: "{{ quay_api_timeout | default(30) }}"
      loop: "{{ quay_sync_candidate_repositories_effective }}"
      loop_control:
        label: "{{ item }}"
      register: _quay_sync_wait_results
      until: >-
        (_quay_sync_wait_results.status | default(0) | int) == 200
        and
        ((_quay_sync_wait_results.json | default({})).get('sync_status', '')) in ['SUCCESS', 'NEVER_RUN']
      retries: "{{ quay_sync_retries | int }}"
      delay: "{{ quay_sync_delay | int }}"
      failed_when: false
      no_log: "{{ quay_hide_sensitive_logs | bool }}"

    - name: Sync | Consolidar resultado da espera dos mirrors
      ansible.builtin.set_fact:
        quay_sync_wait_summary_json: >-
          {%- set timeout = [] -%}
          {%- set terminal_failed = [] -%}
          {%- set http_errors = [] -%}
          {%- for r in (_quay_sync_wait_results.results | default([])) -%}
            {%- set body = r.json | default({}) -%}
            {%- set repo = r.item | default('N/A') -%}
            {%- set http_status = r.status | default(0) | int -%}
            {%- set sync_status = body.sync_status | default('UNKNOWN') -%}
            {%- set attempts = r.attempts | default(1) | int -%}
            {%- set message = body.detail | default(body.error_message | default(r.msg | default(''))) -%}

            {%- if http_status != 200 -%}
              {%- set _ = http_errors.append({
                'repository': repo,
                'http_status': http_status,
                'sync_status': sync_status,
                'attempts': attempts,
                'message': message
              }) -%}
            {%- elif sync_status in ['FAIL', 'FAILED', 'ERROR'] -%}
              {%- set _ = terminal_failed.append({
                'repository': repo,
                'http_status': http_status,
                'sync_status': sync_status,
                'attempts': attempts,
                'message': message
              }) -%}
            {%- elif sync_status not in ['SUCCESS', 'NEVER_RUN'] -%}
              {%- set _ = timeout.append({
                'repository': repo,
                'http_status': http_status,
                'sync_status': sync_status,
                'attempts': attempts,
                'message': message
              }) -%}
            {%- endif -%}
          {%- endfor -%}
          {{
            {
              'timeout': timeout,
              'terminal_failed': terminal_failed,
              'http_errors': http_errors,
              'total_timeout': timeout | length,
              'total_terminal_failed': terminal_failed | length,
              'total_http_errors': http_errors | length,
              'has_partial_failure': ((timeout | length) > 0 or (terminal_failed | length) > 0 or (http_errors | length) > 0)
            } | to_json
          }}

    - name: Sync | Publicar resultado da espera dos mirrors
      ansible.builtin.set_fact:
        quay_sync_wait_summary: "{{ quay_sync_wait_summary_json | from_json }}"

    - name: Sync | Exibir resumo de execução parcial
      ansible.builtin.debug:
        msg:
          - "Sync parcial/falhas operacionais: {{ quay_sync_wait_summary.has_partial_failure | default(false) }}"
          - "Timeout aguardando SUCCESS: {{ quay_sync_wait_summary.total_timeout | default(0) }}"
          - "Falha terminal no Quay: {{ quay_sync_wait_summary.total_terminal_failed | default(0) }}"
          - "Erro HTTP consultando mirror: {{ quay_sync_wait_summary.total_http_errors | default(0) }}"
          - "Falhas nas ações sync-cancel/sync-now: {{ quay_sync_failed_actions | default(0) }}"

- name: Sync | Recoletar mirror config após sync
  ansible.builtin.import_tasks: 30_collect_mirror_config.yml
  when: quay_sync_candidate_repositories_effective | length > 0

- name: Sync | Recoletar tags após sync
  ansible.builtin.include_tasks: 40_collect_tags.yml
  vars:
    quay_compare_stage: "final"
  when: quay_sync_candidate_repositories_effective | length > 0

- name: Sync | Comparar estado final após sync
  ansible.builtin.include_tasks: 50_compare_tags.yml
  vars:
    quay_compare_stage: "final"
  when: quay_sync_candidate_repositories_effective | length > 0

- name: Sync | Definir resultado final sem candidatos
  ansible.builtin.set_fact:
    quay_final_result: "{{ quay_initial_result }}"
    quay_final_summary: "{{ quay_initial_summary }}"
    quay_final_rows: "{{ quay_initial_rows }}"
    quay_final_mirror_configs: "{{ quay_mirror_configs }}"
  when: quay_sync_candidate_repositories_effective | length == 0
