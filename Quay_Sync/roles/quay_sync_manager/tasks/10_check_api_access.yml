- name: Definir namespace usado para validação dos tokens
  ansible.builtin.set_fact:
    quay_token_validation_namespace: "{{ quay_discovery_namespaces[0] }}"

- name: Validar discovery da API do Quay origem
  ansible.builtin.uri:
    url: "{{ quay_source_url }}/api/v1/discovery"
    method: GET
    validate_certs: "{{ quay_source_validate_certs }}"
    return_content: false
    status_code:
      - 200
    timeout: "{{ quay_api_timeout | default(30) }}"
  register: quay_source_discovery_response

- name: Validar discovery da API do Quay destino
  ansible.builtin.uri:
    url: "{{ quay_target_url }}/api/v1/discovery"
    method: GET
    validate_certs: "{{ quay_target_validate_certs }}"
    return_content: false
    status_code:
      - 200
    timeout: "{{ quay_api_timeout | default(30) }}"
  register: quay_target_discovery_response

- name: Validar token do Quay origem usando listagem de repositories por namespace
  ansible.builtin.uri:
    url: "{{ quay_source_url }}/api/v1/repository?namespace={{ quay_token_validation_namespace | urlencode }}&last_modified=true"
    method: GET
    headers:
      Authorization: "Bearer {{ quay_source.token }}"
      Accept: "application/json"
    validate_certs: "{{ quay_source_validate_certs }}"
    return_content: true
    status_code:
      - 200
    timeout: "{{ quay_api_timeout | default(30) }}"
  register: quay_source_token_validation_response
  no_log: "{{ quay_hide_sensitive_logs | bool }}"

- name: Validar token do Quay destino usando listagem de repositories por namespace
  ansible.builtin.uri:
    url: "{{ quay_target_url }}/api/v1/repository?namespace={{ quay_token_validation_namespace | urlencode }}&last_modified=true"
    method: GET
    headers:
      Authorization: "Bearer {{ quay_target.token }}"
      Accept: "application/json"
    validate_certs: "{{ quay_target_validate_certs }}"
    return_content: true
    status_code:
      - 200
    timeout: "{{ quay_api_timeout | default(30) }}"
  register: quay_target_token_validation_response
  no_log: "{{ quay_hide_sensitive_logs | bool }}"

- name: Exibir resumo da validação de acesso à API
  ansible.builtin.debug:
    msg:
      - "API Quay origem acessível: {{ quay_source.name | default('PRD') }} - {{ quay_source_url }}"
      - "API Quay destino acessível: {{ quay_target.name | default('DR') }} - {{ quay_target_url }}"
      - "Namespace usado para validação dos tokens: {{ quay_token_validation_namespace }}"
      - "Token origem validado via endpoint de repository."
      - "Token destino validado via endpoint de repository."